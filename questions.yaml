questions:
  - variable: replicaCount
    default: 1
    description: Quantidade de replicas do Deployment.
    type: int
    min: 1
    max: 10
    required: true
    label: Replica Count
    group: "Workload"

  - variable: image.repository
    default: nginx
    description: Repositorio da imagem do container.
    type: string
    required: true
    label: Image Repository
    group: "Container"

  - variable: image.tag
    default: ""
    description: Tag da imagem. Deixe vazio para usar Chart.appVersion.
    type: string
    required: false
    label: Image Tag
    group: "Container"

  - variable: image.pullPolicy
    default: IfNotPresent
    description: Politica de pull da imagem.
    type: enum
    options:
      - Always
      - IfNotPresent
      - Never
    required: true
    label: Image Pull Policy
    group: "Container"

  - variable: service.type
    default: ClusterIP
    description: Tipo do Service Kubernetes.
    type: enum
    options:
      - ClusterIP
      - NodePort
      - LoadBalancer
    required: true
    label: Service Type
    group: "Networking"

  - variable: service.port
    default: 80
    description: Porta exposta pelo Service e container.
    type: int
    min: 1
    max: 60000
    required: true
    label: Service Port
    group: "Networking"

  - variable: ingress.enabled
    default: false
    description: Habilita a criacao de Ingress.
    type: boolean
    required: true
    label: Enable Ingress
    group: "Networking"

  - variable: ingress.className
    default: ""
    description: "Ingress controller"
    type: string
    required: false
    label: Ingress Class Name
    group: "Networking"
    show_if: "ingress.enabled=true"

  - variable: ingress.hosts[0].host
    default: chart-example.local
    description: Host principal do ingress.
    type: hostname
    required: true
    label: Primary Host
    group: "Networking"
    show_if: "ingress.enabled=true"

  - variable: ingress.hosts[0].paths[0].path
    default: /
    description: Path principal da regra de ingress.
    type: string
    required: true
    label: Primary Path
    group: "Networking"
    show_if: "ingress.enabled=true"

  - variable: ingress.hosts[0].paths[0].pathType
    default: ImplementationSpecific
    description: Tipo path.
    type: enum
    options:
      - ImplementationSpecific
      - Prefix
      - Exact
    required: true
    label: Primary Path Type
    group: "Networking"
    show_if: "ingress.enabled=true"

  - variable: ingress.tls[0].secretName
    default: ""
    description: Nome do Secret TLS
    type: string
    required: false
    label: TLS Secret Name
    group: "Networking"
    show_if: "ingress.enabled=true"

  - variable: ingress.tls[0].hosts[0]
    default: chart-example.local
    description: Host TLS.
    type: hostname
    required: false
    label: TLS Host
    group: "Networking"
    show_if: "ingress.enabled=true"

  - variable: autoscaling.enabled
    default: false
    description: Habilita HPA.
    type: boolean
    required: true
    label: Enable Autoscaling (HPA)
    group: "Scaling"
    show_subquestion_if: true
    subquestions:
      - variable: autoscaling.minReplicas
        default: 1
        description: Quantidade minima de replicas para HPA.
        type: int
        min: 1
        max: 20
        required: true
        label: HPA Min Replicas

      - variable: autoscaling.maxReplicas
        default: 5
        description: Quantidade maxima de replicas para HPA.
        type: int
        min: 1
        max: 100
        required: true
        label: HPA Max Replicas

      - variable: autoscaling.targetCPUUtilizationPercentage
        default: 80
        description: quntidade de uso de CPU em porcentagem.
        type: int
        min: 1
        max: 100
        required: true
        label: HPA Target CPU (%)

  - variable: nameOverride
    default: ""
    description: Sobrescreve apenas o nome base do chart.
    type: string
    required: false
    label: Name Override
    group: "Naming"

  - variable: fullnameOverride
    default: ""
    description: Sobrescreve o nome completo dos recursos gerados.
    type: string
    required: false
    label: Fullname Override
    group: "Naming"
